
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema de Advogados Dativos</title>
<style>
body{font-family:Arial;margin:40px;background:#f5f7fb}
button{padding:10px 16px;margin:5px;border:none;border-radius:6px;background:#2f5be7;color:#fff;cursor:pointer}
textarea{width:100%;height:250px;margin-top:15px}
.card{background:#fff;padding:20px;border-radius:10px;margin-bottom:20px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
</style>
</head>

<body>

<div class="card">
<h3>Configuração</h3>
<input id="apiUrl" style="width:100%" placeholder="Cole aqui a URL do Apps Script /exec">
<br><br>
<button onclick="syncNow()">SINCRONIZAR AGORA</button>
<button onclick="resetTudo()">ZERAR TUDO</button>
</div>

<div class="card">
<h3>Gerar Minuta</h3>

<select id="modeloSelect"></select>
<br><br>

<input id="acusados" placeholder="ACUSADOS">
<input id="advogado" placeholder="ADVOGADO">
<input id="oab" placeholder="OAB">
<br><br>

<button onclick="gerar()">GERAR MINUTA</button>

<textarea id="resultado"></textarea>
</div>

<div class="card">
<h3>Histórico</h3>
<div id="historico"></div>
</div>

<script>

let modelos = {}
let historico = []

function api(){ return document.getElementById("apiUrl").value }

async function syncNow(){

 const url = api()+"?action=load"

 const r = await fetch(url)
 const j = await r.json()

 modelos = j.modelos || {}
 historico = j.hist || []

 carregarModelos()
 carregarHistorico()

}

function carregarModelos(){

 const sel = document.getElementById("modeloSelect")
 sel.innerHTML=""

 Object.keys(modelos).forEach(m=>{

   const o=document.createElement("option")
   o.value=m
   o.textContent=m
   sel.appendChild(o)

 })

}

function gerar(){

 const modelo=document.getElementById("modeloSelect").value
 const txt=modelos[modelo].texto

 const acusados=document.getElementById("acusados").value
 const advogado=document.getElementById("advogado").value
 const oab=document.getElementById("oab").value

 let final=txt
 final=final.replaceAll("{{ACUSADOS}}",acusados)
 final=final.replaceAll("{{ADVOGADO}}",advogado)
 final=final.replaceAll("{{OAB}}",oab)

 document.getElementById("resultado").value=final

 salvarHistorico(acusados,advogado)

}

async function salvarHistorico(acusados,advogado){

 const body={
  action:"append_nomeacao",
  registro:{
   id:Date.now().toString(),
   advogado:advogado,
   acusados:acusados,
   registradoPor:"USUARIO"
  }
 }

 await fetch(api(),{
  method:"POST",
  body:JSON.stringify(body)
 })

 syncNow()

}

function carregarHistorico(){

 const div=document.getElementById("historico")
 div.innerHTML=""

 historico.forEach(h=>{

   const d=document.createElement("div")
   d.innerHTML=`
   <b>${h.advogado}</b><br>
   ${h.acusados}<br>
   <button onclick="excluir('${h.id}')">EXCLUIR</button>
   <hr>`

   div.appendChild(d)

 })

}

async function excluir(id){

 await fetch(api(),{
  method:"POST",
  body:JSON.stringify({
    action:"delete_nomeacao",
    id:id
  })
 })

 syncNow()

}

async function resetTudo(){

 await fetch(api(),{
  method:"POST",
  body:JSON.stringify({
    action:"reset_tudo"
  })
 })

 syncNow()

}

</script>

</body>
</html>
